<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Booking | Travel Agency System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-navy: #0e1e3a; --accent-gold: #f9b233; --bg-light: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); color: var(--primary-navy); }
        .navbar-custom { background-color: var(--primary-navy); border-bottom: 3px solid var(--accent-gold); padding: 15px 5%; }
        .booking-container { max-width: 900px; margin: 50px auto; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .section-header { border-left: 5px solid var(--accent-gold); padding-left: 15px; margin-bottom: 30px; font-weight: 800; color: var(--primary-navy); }
        .form-label { font-weight: 700; font-size: 13px; color: #64748b; }
        .price-card { background: #f1f5f9; padding: 20px; border-radius: 15px; text-align: right; border: 1px dashed var(--primary-navy); }
        .btn-pay { background: var(--primary-navy); color: white; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; border: none; transition: 0.3s; margin-top: 20px; }
        .btn-pay:hover { background: var(--accent-gold); color: black; transform: translateY(-3px); }
        .ssr-box { background: #fffcf5; padding: 20px; border-radius: 15px; border: 1px solid #fef3c7; }
    </style>
</head>
<body>
    <nav class="navbar navbar-custom">
        <div class="container-fluid">
            <span class="navbar-brand text-white fw-bold">✈️ Travel Agency Portal</span>
            <button onclick="logout()" class="btn btn-sm btn-outline-light">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="booking-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="section-header mb-0">Step 2: Passenger Details</h3>
                <div class="price-card">
                    <small class="fw-bold text-muted">TOTAL FARE</small>
                    <h2 class="fw-800 mb-0" id="livePrice">₹ 5,500</h2>
                </div>
            </div>

            <form id="mainBookingForm">
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">PASSENGER NAME</label>
                        <input type="text" id="pName" class="form-control" placeholder="Full Name as per ID" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">AGE</label>
                        <input type="number" id="pAge" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">GENDER</label>
                        <select id="pGender" class="form-select">
                            <option>Male</option><option>Female</option><option>Other</option>
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label">PASSPORT / ID PROOF NO</label>
                        <input type="text" id="pID" class="form-control" placeholder="Enter ID Details" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">CABIN CLASS</label>
                        <select id="cabinClass" class="form-select" onchange="calculatePrice()">
                            <option value="Economy" data-amt="5500">Economy Class</option>
                            <option value="Business" data-amt="12500">Business Class</option>
                            <option value="First" data-amt="25000">First Class</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">CHOOSE SEAT NO</label>
                        <select id="seatID" class="form-select">
                            <option>12A (Window)</option><option>14C (Aisle)</option><option>05B (Middle)</option>
                        </select>
                    </div>
                </div>

                <h5 class="section-header">Special Service Requests</h5>
                <div class="ssr-box mb-4">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">FOOD PREFERENCE</label>
                            <select id="mealPref" class="form-select">
                                <option value="None">No Meal Required</option>
                                <option value="Veg">Vegetarian (Veg)</option>
                                <option value="Non-Veg">Non-Vegetarian (Non-Veg)</option>
                                <option value="Vegan">Vegan / Jain Meal</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">ADDITIONAL ASSISTANCE</label>
                            <div class="d-flex gap-3 mt-2">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="ssrWheelchair">
                                    <label class="form-check-label small fw-bold">Wheelchair</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="ssrInfant">
                                    <label class="form-check-label small fw-bold">Infant Bassinet</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-pay shadow">Proceed to Payment Gateway ➔</button>
            </form>
        </div>
    </div>

    <script>
        
    if (localStorage.getItem('isLoggedIn') !== 'true') { window.location.href = "index.html"; }

    const urlParams = new URLSearchParams(window.location.search);
    const flightId = urlParams.get('flight_id') || 201;

    function calculatePrice() {
        const selectElement = document.getElementById('cabinClass');
        const price = selectElement.options[selectElement.selectedIndex].getAttribute('data-amt');
        document.getElementById('livePrice').innerText = "₹ " + Number(price).toLocaleString();
        localStorage.setItem('bookingTotal', price);
    }

    document.getElementById('mainBookingForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const bookingData = {
            agent_id: 1,
            flight_id: parseInt(flightId),
            booking_date: new Date().toISOString().split('T')[0],
            passenger_id: 101,
            seat_id: 3,
            meal_preference: document.getElementById('mealPref').value,
            wheelchair_required: document.getElementById('ssrWheelchair').checked ? 'YES' : 'NO',
            special_assistance: null,
            infant_bassinet_required: document.getElementById('ssrInfant').checked ? 'YES' : 'NO'
        };

        try {
            const res = await fetch('http://localhost:3000/api/booking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });

            const data = await res.json();

            if (data.success) {
                localStorage.setItem('booking_id', data.booking_id);
                alert('Booking successful! Booking ID: ' + data.booking_id);
                window.location.href = "payment.html";
            } else {
                alert('Booking failed: ' + data.message);
            }
        } catch (err) {
            alert('Error: ' + err.message);
        }
    });

    function logout() { localStorage.removeItem('isLoggedIn'); window.location.href = "index.html"; }
    window.onload = calculatePrice;

    </script>
</body>
</html>
