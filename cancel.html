<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Booking | Travel Agency DBMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-navy: #0e1e3a; --accent-gold: #f9b233; --main-red: #dc2626; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fef2f2; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header-custom { background-color: var(--primary-navy); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent-gold); }
        .nav-link { color: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 14px; }
        .nav-link.active { background: var(--accent-gold); color: #000; }

        .hero-banner { background: linear-gradient(135deg, var(--primary-navy) 0%, #450a0a 100%); height: 180px; padding: 40px 5%; border-bottom-left-radius: 80px; border-bottom-right-radius: 80px; color: white; text-align: center; }

        .cancel-card { background: white; border-radius: 25px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); margin-top: -60px; margin-bottom: 60px; max-width: 600px; margin-left: auto; margin-right: auto; border: 1px solid #fee2e2; position: relative; z-index: 10; }
        
        .btn-cancel { background: var(--main-red); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; width: 100%; transition: 0.3s; cursor: pointer; }
        .btn-cancel:hover { background: #b91c1c; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220, 38, 38, 0.2); }

        .footer-custom { background-color: var(--primary-navy); color: white; padding: 20px 5%; margin-top: auto; display: flex; justify-content: space-between; font-size: 14px; }
    </style>
</head>
<body>

    <header class="header-custom">
        <div style="color:white; font-weight:800; font-size:20px;">✈️ Travel Agency</div>
        <nav style="background: #1c2e4a; border-radius: 50px; padding: 5px; display: flex;">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="flights.html">Flights</a>
            <a class="nav-link" href="booking.html">Booking</a>
            <a class="nav-link active" href="cancel.html">Cancel</a>
        </nav>
    </header>

    <div class="hero-banner">
        <h2 class="fw-bold">Manage Your Booking</h2>
        <p class="opacity-75">Enter your details to request a ticket cancellation or refund.</p>
    </div>

    <div class="container">
        <div class="cancel-card text-center" id="mainCard">
            <div style="font-size: 40px; margin-bottom: 20px;">📑</div>
            <h4 class="fw-bold mb-4" style="color:var(--primary-navy)">Find Your Ticket</h4>
            
            <form id="cancelForm">
                <div class="text-start mb-3">
                    <label class="small fw-bold text-muted">PNR NUMBER / TICKET ID</label>
                    <input type="text" id="pnrInput" class="form-control p-3" placeholder="e.g. TXN992834" required style="border-radius:10px;">
                </div>
                <div class="text-start mb-4">
                    <label class="small fw-bold text-muted">REGISTERED ID NUMBER</label>
                    <input type="text" id="idInput" class="form-control p-3" placeholder="Aadhaar or Passport Number" required style="border-radius:10px;">
                </div>
                
                <div class="alert alert-warning small text-start mb-4">
                    <strong>Note:</strong> Cancellation charges (₹500) will be deducted from your refund.
                </div>

                <button type="submit" class="btn-cancel">Cancel My Ticket ➔</button>
            </form>
        </div>
    </div>

    <footer class="footer-custom">
        <div>© 2026 Travel Agency Ticket Management System</div>
        <div>24/7 Support: 1800-CANCEL-HELP</div>
    </footer>

    <script>
        // --- 1. LOGIN BYPASS FOR TESTING ---
        // If you want to force access for testing, uncomment the next line:
        // localStorage.setItem('isLoggedIn', 'true');

        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("🔒 Access Denied. Redirecting to Home...");
            window.location.href = "index.html"; 
        }

        // --- 2. FORM HANDLING ---
        const cancelForm = document.getElementById('cancelForm');
        cancelForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const pnr = document.getElementById('pnrInput').value;
            
            if(confirm("Are you sure you want to cancel " + pnr + "?")) {
                document.getElementById('mainCard').innerHTML = `
                    <div class="py-5">
                        <div style="font-size: 60px;">✅</div>
                        <h3 class="fw-bold mt-3" style="color:var(--primary-navy)">Cancellation Requested</h3>
                        <p class="text-muted">Refund for ${pnr} is being processed to your original payment method.</p>
                        <a href="index.html" class="btn btn-dark mt-3 px-4">Back to Dashboard</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
