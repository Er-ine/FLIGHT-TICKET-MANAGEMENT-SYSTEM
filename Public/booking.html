<script>
    if (localStorage.getItem('isLoggedIn') !== 'true') {
        window.location.href = "index.html";
    }

    // Load flight details from localStorage
    const flightNum = localStorage.getItem('flightNum') || '';
    const airline = localStorage.getItem('airline') || '';
    const origin = localStorage.getItem('origin') || '';
    const dest = localStorage.getItem('dest') || '';
    const dep = localStorage.getItem('dep') || '';
    const arr = localStorage.getItem('arr') || '';
    const cabinClass = localStorage.getItem('cabinClass') || 'Economy';
    const selectedSeat = localStorage.getItem('selectedSeat') || '12A';

    // Show flight summary banner
    document.getElementById('bannerAirline').textContent = `${airline} · ${flightNum}`;
    document.getElementById('bannerRoute').textContent = `${origin} → ${dest}`;
    document.getElementById('bannerTime').textContent = `Departure: ${dep} | Arrival: ${arr}`;
    document.getElementById('bannerClass').textContent = localStorage.getItem('cabinClass') || 'Economy';
    document.getElementById('bannerSeat').textContent = localStorage.getItem('selectedSeat') || '12A';  


    function calculatePrice() {
        const saved = localStorage.getItem('bookingTotal');
        if (saved) {
            document.getElementById('livePrice').innerText = "₹ " + parseInt(saved).toLocaleString();
        }
    }

    document.getElementById('mainBookingForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const name = document.getElementById('pName').value;
        const age = document.getElementById('pAge').value;
        const gender = document.getElementById('pGender').value.toUpperCase();
        const passport = document.getElementById('pID').value;
        const cabin = (localStorage.getItem('cabinClass') || 'Economy').toUpperCase();
        const total = localStorage.getItem('bookingTotal') || 5500;
        const realFlightId = 201; // seeded DB flight used for all bookings

        if (!passport) { alert('Please enter Passport / ID Number'); return; }

        try {
            // Step 1: Create passenger
            const pRes = await fetch('/api/passenger', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, age, gender, passport_number: passport })
            });
            const pData = await pRes.json();
            console.log('Passenger:', pData);
            if (!pData.success) { alert('Passenger error: ' + pData.message); return; }

            // Step 2: Create seat
            const sRes = await fetch('/api/seat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ flight_id: realFlightId, class: cabin, price: total })
            });
            const sData = await sRes.json();
            console.log('Seat:', sData);
            if (!sData.success) { alert('Seat error: ' + sData.message); return; }

            // Step 3: Create booking
            const bRes = await fetch('/api/booking', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    agent_id: 1,
                    flight_id: realFlightId,
                    booking_date: new Date().toISOString().split('T')[0],
                    passenger_id: pData.passenger_id,
                    seat_id: sData.seat_id,
                    meal_preference: document.getElementById('mealPref').value,
                    wheelchair_required: document.getElementById('ssrWheelchair').checked ? 'YES' : 'NO',
                    special_assistance: document.getElementById('ssrMedical').checked ? 'MEDICAL SUPPORT' : null,
                    infant_bassinet_required: document.getElementById('ssrInfant').checked ? 'YES' : 'NO'
                })
            });
            const bData = await bRes.json();
            console.log('Booking:', bData);
            if (!bData.success) { alert('Booking failed: ' + bData.message); return; }

            localStorage.setItem('booking_id', bData.booking_id);
            localStorage.setItem('passengerName', name);
            localStorage.setItem('passengerID', passport);
            localStorage.setItem('bookingTotal', total);

            window.location.href = "payment.html";

        } catch (err) {
            alert('Error: ' + err.message);
            console.error(err);
        }
    });

    function logout() {
        localStorage.removeItem('isLoggedIn');
        window.location.href = "index.html";
    }

    window.onload = calculatePrice;
</script>
