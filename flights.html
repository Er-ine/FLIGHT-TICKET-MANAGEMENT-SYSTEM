<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flights | Live Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary-navy: #0e1e3a; --accent-gold: #f9b233; --main-blue: #0250d4; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fa; min-height: 100vh; display: flex; flex-direction: column; }
        .header-custom { background: var(--primary-navy); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent-gold); }
        .nav-link { color: rgba(255,255,255,0.8); text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: 600; }
        .nav-link.active { background: var(--accent-gold); color: #000; }
        .search-area { background: var(--primary-navy); padding: 30px 5% 60px; border-bottom-left-radius: 60px; border-bottom-right-radius: 60px; color: white; }
        .filter-box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); color: #333; margin-top: 20px; }
        .flight-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 15px; border: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .flight-card:hover { border-color: var(--main-blue); transform: translateY(-3px); }
        .footer-custom { background: var(--primary-navy); color: white; padding: 25px 5%; margin-top: auto; }
    </style>
</head>
<body>
    <header class="header-custom">
        <div style="color:white; font-weight:800; font-size:20px;">✈️ Travel Agency</div>
        <nav style="background: #1c2e4a; border-radius: 50px; padding: 5px; display: flex;">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link active" href="flights.html">Flights</a>
            <a class="nav-link" href="booking.html">Booking</a>
            <a class="nav-link" href="payment.html">Payment</a>
        </nav>
    </header>

    <div class="search-area text-center">
        <h2 class="fw-bold mb-1">Find Your Flight</h2>
        <p class="opacity-75">Search for today or book for a future date</p>
        <div class="container filter-box text-start">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">CHOOSE TRAVEL DATE</label>
                    <input type="date" id="travelDate" class="form-control p-3" style="border: 2px solid var(--accent-gold); border-radius:12px;" onchange="filterByDate()">
                </div>
                <div class="col-md-4">
                    <label class="small fw-bold text-muted">DESTINATION TYPE</label>
                    <select id="typeFilter" class="form-select p-3" style="border-radius:12px;" onchange="filterByDate()">
                        <option value="all">All Destinations</option>
                        <option value="india">Within India</option>
                        <option value="abroad">Abroad (International)</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-primary w-100 p-3 fw-bold" style="background:var(--main-blue); border-radius:12px;" onclick="filterByDate()">Search for this Date</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-5">
        <div id="flightResults"></div>
    </div>

    <footer class="footer-custom">
        <div>© 2026 Travel Agency Management System</div>
        <div>📍 Global H.Q.</div>
    </footer>

    <script>
        const allFlights = [
            { id: 'FL001', name: 'IndiGo', route: 'Mumbai ➔ Delhi', type: 'india', price: 4500, seats: 12, dep: '10:30 AM', arr: '12:45 PM' },
            { id: 'FL002', name: 'Air India', route: 'Kochi ➔ Bangalore', type: 'india', price: 3200, seats: 8, dep: '02:15 PM', arr: '04:00 PM' },
            { id: 'FL003', name: 'Emirates', route: 'Delhi ➔ Dubai', type: 'abroad', price: 35000, seats: 5, dep: '04:00 AM', arr: '07:30 AM' },
            { id: 'FL004', name: 'Singapore Air', route: 'Chennai ➔ Singapore', type: 'abroad', price: 28000, seats: 3, dep: '11:20 PM', arr: '06:10 AM' },
            { id: 'FL005', name: 'Vistara', route: 'Delhi ➔ Goa', type: 'india', price: 6000, seats: 10, dep: '01:00 PM', arr: '03:30 PM' }
        ];

        function filterByDate() {
            const date = document.getElementById('travelDate').value;
            const type = document.getElementById('typeFilter').value;
            const container = document.getElementById('flightResults');
            let filtered = allFlights.filter(f => type === 'all' || f.type === type);

            container.innerHTML = `<h5 class="fw-bold mb-4">Available Flights for: ${date ? date : 'Today'}</h5>`;
            
            filtered.forEach(f => {
                container.innerHTML += `
                    <div class="flight-card shadow-sm">
                        <div>
                            <small class="text-muted fw-bold">ID: ${f.id}</small>
                            <h5 class="fw-bold mb-0">${f.name}</h5>
                            <small class="text-primary fw-bold">${f.type.toUpperCase()}</small>
                        </div>
                        <div class="text-center">
                            <div class="fw-bold h6 mb-1">${f.route}</div>
                            <div class="small text-muted">🕒 Dep: ${f.dep} | Arr: ${f.arr}</div>
                        </div>
                        <div class="text-center">
                            <div class="h5 fw-bold mb-0">₹${f.price.toLocaleString()}</div>
                            <small class="text-success fw-bold">${f.seats} Seats Left</small>
                        </div>
                        <a href="booking.html" class="btn btn-dark fw-bold px-4" style="border-radius:10px;">Select</a>
                    </div>
                `;
            });
        }

        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert("🔒 Access Denied. Please login first.");
            window.location.href = "login.html";
        }

        function logout() {
            if(confirm("Are you sure?")) {
                localStorage.removeItem('isLoggedIn');
                window.location.href = "login.html";
            }
        }
        window.onload = filterByDate;
    </script>
</body>
</html>
